name: 'Moon'
permissions:
  contents: read
on:
  push:
    branches:
      - '**'
      - '!dependabot/**'

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        task: [typecheck, test, lint]
    name: ${{ matrix.task }}
    runs-on: 'ubuntu-latest'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: 'moonrepo/setup-toolchain@v0.6.2'
      - run: 'moon ci :${{ matrix.task }}'
