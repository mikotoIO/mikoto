# https://moonrepo.dev/docs/config/workspace
$schema: './cache/schemas/workspace.json'

# extends: './shared/workspace.yml'

projects:
  - '.'
  - 'apps/client' # frontend
  - 'apps/content-proxy' # cdn
  - 'apps/superego' # backend
  - 'crates/*'
  - 'examples/*'
  - 'packages/*'
vcs:
  manager: 'git'
  defaultBranch: 'main'
